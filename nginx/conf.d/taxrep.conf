# HTTP → HTTPS редирект + Certbot challenge
server {
    listen 80;
    server_name taxrep.finitin.us;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name taxrep.finitin.us;

    ssl_certificate     /etc/letsencrypt/live/taxrep.finitin.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taxrep.finitin.us/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; frame-src https://oauth.telegram.org; img-src 'self' data: https:;" always;

    # ── API ────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /health {
        proxy_pass http://api:8000/health;
    }

    # ── Frontend (SPA) ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;

        # HTML-файлы не кэшируем (SPA routing)
        location ~* \.html$ {
            proxy_pass http://frontend:80;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ── Загрузка файлов ────────────────────────────────────────────────────
    location /uploads/ {
        # Файлы отдаёт backend — не доступны напрямую
        deny all;
    }
}
